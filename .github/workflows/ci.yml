name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pead_user
          POSTGRES_PASSWORD: pead_ci_pw
          POSTGRES_DB: pead
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_USER: pead_user
      POSTGRES_PASSWORD: pead_ci_pw
      POSTGRES_DB: pead
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      FMP_API_KEY: unused-in-ci
      ALPHAVANTAGE_API_KEY: unused-in-ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: make lint

      - name: Type check
        run: make typecheck

      - name: Apply schema and view
        run: |
          psql "postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB" -f schema.sql
          psql "postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB" -f migrate_tiers.sql
          psql "postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB" -f migrate_lineage.sql
          psql "postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB" -f schema_ff_factors.sql
          psql "postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB" -f create_view.sql

      - name: Run tests
        run: make test

      - name: Load the full historical dataset
        run: python load_full_dataset.py

      - name: Smoke-test the analysis scripts against real data
        run: |
          python data_quality_checks.py
          python eda.py
          python tier_analysis.py
          python sector_analysis.py
          python signal_analysis.py
          python model.py
          python model_v2.py
          python validity_checks.py
          python event_study.py
          python market_model.py
          python fama_french_model.py
          python economic_significance.py
          python survivorship_check.py
          python power_analysis.py
          python backtest_equity_curve.py
          python volatility_risk_premium.py
          python straddle_backtest.py
          python iron_condor_backtest.py
          python garch_volatility_forecast.py
          python garch_straddle_backtest.py
          python holding_period_sensitivity.py
          python volatility_crush_check.py
          python bootstrap_confidence_intervals.py
          python vix_regime_analysis.py
